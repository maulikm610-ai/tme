<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maulik Express</title>
    
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        body {
            font-family: 'Georgia', 'Times New Roman', Times, serif;
            background-color: #f5f2eb; /* હળવો ન્યૂઝપેપર પેપર કલર */
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #fbfaf7; /* શુદ્ધ ન્યૂઝપેપર કટ આઉટ પેપર કલર */
            padding: 40px 30px;
            border: 2px solid #2b2b2b;
            box-shadow: 5px 5px 0px #2b2b2b; /* ક્લાસિક રેટ્રો શેડો */
            text-align: center;
            position: relative;
        }
        /* ન્યૂઝપેપર કટ આઉટ ઇફેક્ટ માટે ટોપ બોર્ડર */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: repeating-linear-gradient(90deg, #2b2b2b, #2b2b2b 10px, transparent 10px, transparent 20px);
        }
        h2 {
            color: #111111;
            margin: 0 0 5px 0;
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 3px double #111111;
            padding-bottom: 10px;
        }
        .tagline {
            font-style: italic;
            color: #444444;
            margin-top: 8px;
            margin-bottom: 35px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: bold;
            font-size: 15px;
            color: #222222;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            border: 2px solid #2b2b2b;
            background: #fff;
            box-sizing: border-box;
            cursor: pointer;
            outline: none;
        }
        input[type="date"]:focus {
            background: #fdfdfa;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.1);
        }
        .submit-btn {
            width: 100%;
            background-color: #111111; /* ડાર્ક ન્યૂઝપેપર બ્લેક */
            color: #fbfaf7;
            border: 2px solid #111111;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            background-color: #fbfaf7;
            color: #111111;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>The Maulik Express</h2>
    <div class="tagline">દૈનિક ડાયરી • ઇન્ટેલિજન્સ રિપોર્ટ • ટ્રેકર</div>
    
    <div class="form-group">
        <label for="mddDate">તારીખ પસંદ કરો / SELECT DATE:</label>
        <input type="date" id="mddDate">
    </div>

    <button class="submit-btn" onclick="openTMEPage()">Continue →</button>
</div>

<script>
function openTMEPage() {
    const selectedDate = document.getElementById("mddDate").value; // Format: YYYY-MM-DD

    if (selectedDate) {
        // ફાઇલનું નામ ઓટોમેટિક બનશે, દા.ત. 2026-06-19-TME.html
        const fileName = selectedDate + "-TME.html"; 
        
        // નવી ટેબમાં સીધી એ દિવસની ફાઇલ ખુલી જશે
        window.open(fileName, '_blank');
    } else {
        alert("કૃપા કરીને પહેલા તારીખ પસંદ કરો! / Please select a date first!");
    }
}

// 📱 Service Worker રજિસ્ટ્રેશન
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
        .then(function(reg) { console.log("Service Worker Registered Successfully!"); })
        .catch(function(err) { console.log("Service Worker Failed:", err); });
    });
}
</script>

</body>
</html>
